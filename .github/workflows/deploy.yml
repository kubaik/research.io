name: HealthAssist CDST — Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      # ── 2. Verify docs/ exists ─────────────────────────────────────
      - name: Verify docs output
        run: |
          [ -f "docs/index.html" ]                 || { echo "ERROR: docs/index.html missing — run: python chatbot_system.py build"; exit 1; }
          [ -f "docs/static/js/chat.js" ]          || { echo "ERROR: docs/static/js/chat.js missing";   exit 1; }
          [ -f "docs/static/css/chat.css" ]        || { echo "ERROR: docs/static/css/chat.css missing"; exit 1; }
          [ -f "docs/config.json" ]                || { echo "ERROR: docs/config.json missing";          exit 1; }
          [ -f "docs/static/data/protocols.json" ] || { echo "ERROR: docs/static/data/protocols.json missing"; exit 1; }
          echo "✅ All output files present"
          for f in index.html static/js/chat.js static/css/chat.css config.json static/data/protocols.json; do
            echo "$f : $(wc -c < docs/$f) bytes"
          done

      # ── 3. Inject API tokens into chat.js ─────────────────────────
      #
      # Each provider has its own named placeholder in the JS bundle:
      #   __GIT_TOKEN__         → GitHub Models  (tried first)
      #   __ANTHROPIC_API_KEY__ → Anthropic Claude
      #   __OPENAI_API_KEY__    → OpenAI
      #   __GROQ_API_KEY__      → Groq
      #   __MISTRAL_API_KEY__   → Mistral
      #
      # Only secrets that are set in GitHub → Settings → Secrets → Actions
      # will be injected. The rest stay as __PLACEHOLDER__ strings and are
      # silently skipped by the browser at runtime (startsWith('__') guard).
      #
      # SECURITY: No secret is ever stored in the repository. Placeholders
      # are replaced only inside the ephemeral _site/ copy used for the
      # Pages artifact — the docs/ source files are never modified.
      # ──────────────────────────────────────────────────────────────
      - name: Inject API tokens
        env:
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          cp -r docs _site

          INJECTED=0

          if [ -n "$GIT_TOKEN" ]; then
            sed -i "s|__GIT_TOKEN__|${GIT_TOKEN}|g" _site/static/js/chat.js
            echo "✅ GIT_TOKEN injected         (GitHub Models — primary)"
            INJECTED=$((INJECTED + 1))
          else
            echo "⏭  GIT_TOKEN not set          — provider will be skipped at runtime"
          fi

          if [ -n "$ANTHROPIC_API_KEY" ]; then
            sed -i "s|__ANTHROPIC_API_KEY__|${ANTHROPIC_API_KEY}|g" _site/static/js/chat.js
            echo "✅ ANTHROPIC_API_KEY injected  (Claude — fallback 1)"
            INJECTED=$((INJECTED + 1))
          else
            echo "⏭  ANTHROPIC_API_KEY not set  — provider will be skipped at runtime"
          fi

          if [ -n "$OPENAI_API_KEY" ]; then
            sed -i "s|__OPENAI_API_KEY__|${OPENAI_API_KEY}|g" _site/static/js/chat.js
            echo "✅ OPENAI_API_KEY injected     (OpenAI — fallback 2)"
            INJECTED=$((INJECTED + 1))
          else
            echo "⏭  OPENAI_API_KEY not set     — provider will be skipped at runtime"
          fi

          if [ -n "$GROQ_API_KEY" ]; then
            sed -i "s|__GROQ_API_KEY__|${GROQ_API_KEY}|g" _site/static/js/chat.js
            echo "✅ GROQ_API_KEY injected       (Groq — fallback 3)"
            INJECTED=$((INJECTED + 1))
          else
            echo "⏭  GROQ_API_KEY not set       — provider will be skipped at runtime"
          fi

          if [ -n "$MISTRAL_API_KEY" ]; then
            sed -i "s|__MISTRAL_API_KEY__|${MISTRAL_API_KEY}|g" _site/static/js/chat.js
            echo "✅ MISTRAL_API_KEY injected    (Mistral — fallback 4)"
            INJECTED=$((INJECTED + 1))
          else
            echo "⏭  MISTRAL_API_KEY not set    — provider will be skipped at runtime"
          fi

          echo ""
          if [ "$INJECTED" -eq 0 ]; then
            echo "⚠️  WARNING: No API keys were injected."
            echo "   The app will deploy but the AI service will be unavailable."
            echo "   Add at least one secret in: GitHub → Settings → Secrets → Actions"
          else
            echo "✅ $INJECTED token(s) injected. Remaining placeholders will be skipped by the browser."
          fi

      # ── 4. Deploy ──────────────────────────────────────────────────
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5

      # ── 5. Summary ─────────────────────────────────────────────────
      - name: Summary
        run: |
          {
            echo "## HealthAssist CDST Deployed 🏥"
            echo "**URL**: ${{ steps.deployment.outputs.page_url }}"
            echo "**Trigger**: ${{ github.event_name }}"
            echo "**Run**: #${{ github.run_number }} — $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "### Deployed files"
            echo "| File | Size |"
            echo "|---|---|"
            for f in index.html static/js/chat.js static/css/chat.css config.json static/data/protocols.json; do
              echo "| \`$f\` | $(wc -c < docs/$f) bytes |"
            done
            echo ""
            echo "### Provider fallback order"
            echo "| # | Provider | Secret | Status |"
            echo "|---|---|---|---|"
            echo "| 1 | GitHub Models | \`GIT_TOKEN\` | ${{ secrets.GIT_TOKEN != '' && '✅ Active' || '⏭ Skipped' }} |"
            echo "| 2 | Anthropic     | \`ANTHROPIC_API_KEY\` | ${{ secrets.ANTHROPIC_API_KEY != '' && '✅ Active' || '⏭ Skipped' }} |"
            echo "| 3 | OpenAI        | \`OPENAI_API_KEY\` | ${{ secrets.OPENAI_API_KEY != '' && '✅ Active' || '⏭ Skipped' }} |"
            echo "| 4 | Groq          | \`GROQ_API_KEY\` | ${{ secrets.GROQ_API_KEY != '' && '✅ Active' || '⏭ Skipped' }} |"
            echo "| 5 | Mistral       | \`MISTRAL_API_KEY\` | ${{ secrets.MISTRAL_API_KEY != '' && '✅ Active' || '⏭ Skipped' }} |"
          } >> $GITHUB_STEP_SUMMARY
