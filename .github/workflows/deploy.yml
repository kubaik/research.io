name: HealthAssist CDST — Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      # ── 2. Verify docs/ exists ─────────────────────────────────────
      - name: Verify docs output
        run: |
          [ -f "docs/index.html" ]                       || { echo "ERROR: docs/index.html missing — run: python chatbot_system.py build"; exit 1; }
          [ -f "docs/static/js/chat.js" ]                || { echo "ERROR: docs/static/js/chat.js missing";   exit 1; }
          [ -f "docs/static/css/chat.css" ]              || { echo "ERROR: docs/static/css/chat.css missing"; exit 1; }
          [ -f "docs/config.json" ]                      || { echo "ERROR: docs/config.json missing";          exit 1; }
          [ -f "docs/static/data/protocols.json" ]       || { echo "ERROR: docs/static/data/protocols.json missing"; exit 1; }
          echo "✅ All output files present"
          for f in index.html static/js/chat.js static/css/chat.css config.json static/data/protocols.json; do
            echo "$f : $(wc -c < docs/$f) bytes"
          done

      # ── 3. Inject API key into chat.js at deploy time ──────────────
      # The token placeholder __API_TOKEN__ is replaced with the real secret.
      # This means NO secret is ever stored in the repository.
      # ── 3. Inject API key into chat.js at deploy time ──────────────
      # GIT_TOKEN (GitHub Models) is the primary key.
      # __API_TOKEN__ placeholder is replaced; NO secret is ever in the repo.
      - name: Inject API token
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          cp -r docs _site

          # Priority: GIT_TOKEN first (GitHub Models), then others
          ACTIVE_TOKEN=""
          if [ -n "$GIT_TOKEN" ]; then
            ACTIVE_TOKEN="$GIT_TOKEN"
            echo "Using GIT_TOKEN (GitHub Models)"
          elif [ -n "$ANTHROPIC_API_KEY" ]; then
            ACTIVE_TOKEN="$ANTHROPIC_API_KEY"
            echo "Using ANTHROPIC_API_KEY"
          elif [ -n "$OPENAI_API_KEY" ]; then
            ACTIVE_TOKEN="$OPENAI_API_KEY"
            echo "Using OPENAI_API_KEY"
          elif [ -n "$GROQ_API_KEY" ]; then
            ACTIVE_TOKEN="$GROQ_API_KEY"
            echo "Using GROQ_API_KEY"
          elif [ -n "$MISTRAL_API_KEY" ]; then
            ACTIVE_TOKEN="$MISTRAL_API_KEY"
            echo "Using MISTRAL_API_KEY"
          else
            echo "No API key set — deploying in demo mode"
          fi

          if [ -n "$ACTIVE_TOKEN" ]; then
            sed -i "s|__API_TOKEN__|${ACTIVE_TOKEN}|g" _site/static/js/chat.js
            echo "Token injected into _site/static/js/chat.js"
          fi

      # ── 4. Deploy ──────────────────────────────────────────────────
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5

      # ── 5. Summary ─────────────────────────────────────────────────
      - name: Summary
        run: |
          {
            echo "## HealthAssist CDST Deployed 🏥"
            echo "**URL**: ${{ steps.deployment.outputs.page_url }}"
            echo "**Trigger**: ${{ github.event_name }}"
            echo "**Run**: #${{ github.run_number }} — $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "### Deployed files"
            echo "| File | Size |"
            echo "|---|---|"
            for f in index.html static/js/chat.js static/css/chat.css config.json static/data/protocols.json; do
              echo "| $f | $(wc -c < docs/$f) bytes |"
            done
          } >> $GITHUB_STEP_SUMMARY
